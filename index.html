<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive ML Chess</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="board-panel">
        <div class="board-header">
          <h1>ML Chess Arena</h1>
          <p class="subtitle">Play against a machine-learned style opponent.</p>
        </div>

        <div class="board-wrap">
          <div id="board" class="board" aria-label="Chess board"></div>
        </div>

        <div class="legend">
          <span class="dot white"></span> You play White
          <span class="dot black"></span> AI plays Black
        </div>
      </section>

      <aside class="control-panel">
        <div class="status-card">
          <h2>Game Status</h2>
          <p id="statusText">White to move</p>
          <p id="evaluationText" class="muted">Evaluation: 0.00</p>
        </div>

        <div class="control-card">
          <h2>Difficulty</h2>
          <label for="depthSelect">Search depth</label>
          <select id="depthSelect">
            <option value="2">Easy (2)</option>
            <option value="3" selected>Medium (3)</option>
            <option value="4">Hard (4)</option>
          </select>
          <button id="newGameBtn" type="button">New Game</button>
        </div>

        <div class="control-card">
          <h2>Move Log</h2>
          <ol id="moveList" class="move-list"></ol>
        </div>
      </aside>
    </main>
  </body>
</html>
